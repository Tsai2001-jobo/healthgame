<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康知識挑戰賽</title>
    <style>
        body {
            font-family: "微軟正黑體", "Helvetica Neue", sans-serif;
            background-color: #f0f8ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .app-container {
            background-color: white;
            width: 100%;
            max-width: 500px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 30px;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .question-text {
            font-size: 1.2rem;
            margin-bottom: 25px;
            font-weight: bold;
            line-height: 1.5;
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .option-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }
        .option-btn:hover {
            background-color: #2980b9;
        }
        .option-btn:active {
            transform: scale(0.98);
        }
        .score-board {
            margin-top: 20px;
            font-size: 1.1rem;
            color: #7f8c8d;
        }
        .hidden {
            display: none;
        }
        #result-container h2 {
            color: #27ae60;
        }
        .restart-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 20px;
        }
        .restart-btn:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1>🍎 健康知識挑戰賽</h1>
    
    <div id="quiz-container">
        <div id="question" class="question-text">載入題目中...</div>
        <div id="options" class="options-container">
            </div>
        <div class="score-board">
            目前分數：<span id="current-score">0</span> / 題數：<span id="current-question-num">1</span>
        </div>
    </div>

    <div id="result-container" class="hidden">
        <h2>測驗結束！</h2>
        <p class="question-text">你的總得分是：<span id="final-score">0</span> 分</p>
        <p id="feedback-msg"></p>
        <button class="restart-btn" onclick="startQuiz()">再玩一次</button>
    </div>
</div>

<script>
    // 題目資料庫 (包含題目、選項、正確答案索引)
    const quizData = [
        {
            question: "根據國民健康署的建議，一般成年人每天的適當水分攝取量大約是多少？",
            options: ["1000 毫升", "1500-2000 毫升", "3000 毫升以上", "只需在口渴時喝水"],
            answer: 1 // 陣列索引 1 代表第二個選項
        },
        {
            question: "下列哪一種營養素是人體最主要的能量來源？",
            options: ["蛋白質", "維生素", "碳水化合物", "礦物質"],
            answer: 2
        },
        {
            question: "成年人每天建議的理想睡眠時間大約是多久？",
            options: ["4-5 小時", "7-9 小時", "10-12 小時", "看當天心情決定"],
            answer: 1
        },
        {
            question: "為了維持心血管健康，我們應該盡量避免攝取哪一種脂肪？",
            options: ["不飽和脂肪酸", "Omega-3 脂肪酸", "反式脂肪", "植物性油脂"],
            answer: 2
        },
        {
            question: "根據「我的餐盤」均衡飲食口訣，每天早晚要喝一杯什麼？",
            options: ["果汁", "奶類", "含糖飲料", "咖啡"],
            answer: 1
        }
    ];

    let currentQuestionIndex = 0;
    let score = 0;

    // 取得 DOM 元素
    const quizContainer = document.getElementById('quiz-container');
    const resultContainer = document.getElementById('result-container');
    const questionElement = document.getElementById('question');
    const optionsElement = document.getElementById('options');
    const currentScoreElement = document.getElementById('current-score');
    const currentNumElement = document.getElementById('current-question-num');
    const finalScoreElement = document.getElementById('final-score');
    const feedbackMsgElement = document.getElementById('feedback-msg');

    // 初始化/重新開始遊戲
    function startQuiz() {
        currentQuestionIndex = 0;
        score = 0;
        quizContainer.classList.remove('hidden');
        resultContainer.classList.add('hidden');
        updateScoreBoard();
        loadQuestion();
    }

    // 載入當前題目
    function loadQuestion() {
        const currentQuizData = quizData[currentQuestionIndex];
        questionElement.textContent = currentQuizData.question;
        optionsElement.innerHTML = ''; // 清空選項

        // 動態生成選項按鈕
        currentQuizData.options.forEach((option, index) => {
            const button = document.createElement('button');
            button.textContent = option;
            button.classList.add('option-btn');
            button.onclick = () => selectOption(index);
            optionsElement.appendChild(button);
        });

        currentNumElement.textContent = currentQuestionIndex + 1;
    }

    // 處理使用者選擇
    function selectOption(selectedIndex) {
        const currentQuizData = quizData[currentQuestionIndex];
        
        if (selectedIndex === currentQuizData.answer) {
            score += 20; // 每題 20 分
            alert('答對了！👍');
        } else {
            alert(`答錯了！正確答案是：${currentQuizData.options[currentQuizData.answer]} 😅`);
        }

        currentQuestionIndex++;
        updateScoreBoard();

        if (currentQuestionIndex < quizData.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    // 更新計分板
    function updateScoreBoard() {
        currentScoreElement.textContent = score;
    }

    // 顯示最終結果
    function showResults() {
        quizContainer.classList.add('hidden');
        resultContainer.classList.remove('hidden');
        finalScoreElement.textContent = score;

        // 根據分數給予評語
        if (score === 100) {
            feedbackMsgElement.textContent = "太厲害了！你是健康知識達人！🥇";
        } else if (score >= 60) {
            feedbackMsgElement.textContent = "表現不錯！繼續保持良好的生活習慣喔！💪";
        } else {
            feedbackMsgElement.textContent = "還有進步空間，多多關注健康資訊吧！📚";
        }
    }

    // 網頁載入後立即啟動遊戲
    window.onload = startQuiz;
</script>

</body>
</html>
